<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI File Organizer feature graphic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ebe7e2"/>
      <stop offset="45%" stop-color="#e6e1d9"/>
      <stop offset="100%" stop-color="#ddd8d1"/>
    </linearGradient>
    <radialGradient id="vio" cx="78%" cy="25%" r="45%" fx="78%" fy="25%">
      <stop offset="0%" stop-color="#cdb8ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#cdb8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cya" cx="18%" cy="78%" r="38%" fx="18%" fy="78%">
      <stop offset="0%" stop-color="#8adfff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#8adfff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.9"/></feComponentTransfer>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#5a4638" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#f2efff"/>
      <stop offset="100%" stop-color="#d4e8ff"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#vio)"/>
  <rect width="1024" height="500" fill="url(#cya)"/>

  <!-- left text -->
  <text x="84" y="188" font-family="'Fraunces', 'Playfair Display', Georgia, serif" font-size="56" font-weight="500" letter-spacing="-1.4" fill="#1b1b1d">AI File<tspan x="84" dy="58">Organizer</tspan></text>
  <text x="84" y="296" font-family="'Instrument Sans', 'Inter', system-ui, sans-serif" font-size="18" fill="#5e5c63">Rapikan file HP otomatis pakai<tspan x="84" dy="22">Google Gemini AI • 100% SAF</tspan></text>

  <!-- chips -->
  <g font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" fill="#4a4852">
    <rect x="84" y="336" rx="10" ry="10" width="76" height="28" fill="#ffffff" fill-opacity="0.54" stroke="#ffffff" stroke-opacity="0.85"/>
    <text x="122" y="355" text-anchor="middle">PDF</text>
    <rect x="168" y="336" rx="10" ry="10" width="64" height="28" fill="#ffffff" fill-opacity="0.54" stroke="#ffffff" stroke-opacity="0.85"/>
    <text x="200" y="355" text-anchor="middle">OCR</text>
    <rect x="240" y="336" rx="10" ry="10" width="84" height="28" fill="#ffffff" fill-opacity="0.54" stroke="#ffffff" stroke-opacity="0.85"/>
    <text x="282" y="355" text-anchor="middle">Gemini</text>
  </g>

  <!-- right: visionOS glass orb + cards -->
  <!-- back glass card -->
  <g filter="url(#shadow)" opacity="0.85">
    <rect x="610" y="138" width="280" height="150" rx="22" fill="url(#glassFill)" stroke="#ffffff" stroke-opacity="0.78"/>
  </g>
  <g filter="url(#shadow)" opacity="0.94">
    <rect x="630" y="118" width="280" height="150" rx="22" fill="url(#glassFill)" stroke="#ffffff" stroke-opacity="0.82"/>
  </g>
  <!-- front glass card -->
  <g filter="url(#shadow)">
    <rect x="650" y="96" width="300" height="168" rx="24" fill="url(#glassFill)" stroke="#ffffff" stroke-opacity="0.9"/>
    <!-- specular -->
    <path d="M650 96 h300 a24 24 0 0 1 0 0 v46 q-150 18 -300 0 v-46 a24 24 0 0 1 0 0z" fill="#ffffff" opacity="0.38"/>
  </g>

  <!-- liquid orb -->
  <g>
    <circle cx="800" cy="188" r="56" fill="url(#orb)" stroke="#ffffff" stroke-opacity="0.92" stroke-width="1.5"/>
    <ellipse cx="780" cy="166" rx="26" ry="16" fill="#ffffff" opacity="0.78"/>
    <text x="800" y="196" text-anchor="middle" font-family="'Fraunces', Georgia, serif" font-size="24" font-weight="600" fill="#3a3452">AI</text>
    <!-- glow -->
    <circle cx="800" cy="188" r="76" fill="none" stroke="#c8a8ff" stroke-opacity="0.18" stroke-width="22"/>
  </g>

  <!-- floating mini glass chips -->
  <g font-family="'Instrument Sans', system-ui, sans-serif" font-size="13" fill="#45444a">
    <rect x="582" y="148" rx="12" ry="12" width="52" height="38" fill="#ffffff" fill-opacity="0.58" stroke="#ffffff" stroke-opacity="0.86"/>
    <text x="608" y="172" text-anchor="middle">📄</text>
    <rect x="910" y="130" rx="12" ry="12" width="52" height="38" fill="#ffffff" fill-opacity="0.58" stroke="#ffffff" stroke-opacity="0.86"/>
    <text x="936" y="154" text-anchor="middle">🖼️</text>
    <rect x="610" y="308" rx="12" ry="12" width="52" height="38" fill="#ffffff" fill-opacity="0.58" stroke="#ffffff" stroke-opacity="0.86"/>
    <text x="636" y="332" text-anchor="middle">🧾</text>
  </g>

  <!-- footer meta -->
  <text x="84" y="456" font-family="'Instrument Sans', system-ui, sans-serif" font-size="13" fill="#7a7780">Android 11+ • Open source MIT • github.com/niumination/ai-file-organizer-android</text>
  <text x="940" y="456" text-anchor="end" font-family="'Instrument Sans', system-ui, sans-serif" font-size="12" fill="#8a8891">v1.1 visionOS</text>
</svg>
