name: Android Signed Release – v1.1 visionOS

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  signed:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with: { java-version: '17', distribution: 'temurin', cache: gradle }
    - uses: android-actions/setup-android@v3

    - name: Decode keystore
      env:
        SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      run: echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/ai-organizer-release.jks

    - name: Build signed AAB + APK
      env:
        AIORG_STORE_FILE: ${{ runner.temp }}/ai-organizer-release.jks
        AIORG_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        AIORG_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        AIORG_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      run: |
        chmod +x gradlew
        ./gradlew bundleRelease assembleRelease --stacktrace

    - name: Verify
      run: $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs app/build/outputs/apk/release/app-release.apk || true

    - uses: actions/upload-artifact@v4
      with:
        name: AIFileOrganizer-aab-signed-v1.1
        path: app/build/outputs/bundle/release/app-release.aab
    - uses: actions/upload-artifact@v4
      with:
        name: AIFileOrganizer-apk-signed-v1.1
        path: app/build/outputs/apk/release/app-release.apk

    - name: GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/release/app-release.apk
          app/build/outputs/bundle/release/app-release.aab
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
